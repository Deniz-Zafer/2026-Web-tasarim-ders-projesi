<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Custom To-Do List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles (1).css">
</head>

<body>

    <div class="container">
        <div class="header-row">
            <h2>To-Do List</h2>
            <button class="dark-toggle" id="darkToggleBtn">🌙 Koyu Mod</button>
        </div>

        <div id="progressSection" class="progress-section" style="display:none;">
            <div class="progress-info">
                <span id="progressText">0 / 0 görev tamamlandı</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                <div id="progressBar" class="progress-bar" style="width:0%"></div>
            </div>
        </div>

        <div id="errorBox" class="alert alert-danger error-box" role="alert">
            ⚠️ Saat 00:00 - 23:59 arasında olmalıdır.
        </div>

        <div class="add-task-area">
            <input type="text" id="taskInput" class="form-control" placeholder="Görev adı">
            <input type="date" id="dateInput" class="form-control">
            <input type="text" id="timeInput" class="form-control" placeholder="SS:DD" inputmode="numeric">
            <select id="prioritySelect" class="priority-select">
                <option value="none">— Öncelik —</option>
                <option value="high">🔴 Yüksek</option>
                <option value="medium">🟡 Orta</option>
                <option value="low">🟢 Düşük</option>
            </select>
            <button class="btn add-btn" id="addBtn">Ekle</button>
        </div>

        <div class="search-filter-area mt-4">
            <div class="row g-2">
                <div class="col-md-7">
                    <input type="text" id="searchInput" class="form-control" placeholder="🔍 Görevlerde ara...">
                </div>
                <div class="col-md-5 d-flex gap-2">
                    <select id="statusFilter" class="form-select form-select-sm">
                        <option value="all">Tümü</option>
                        <option value="active">Bekleyenler</option>
                        <option value="completed">Tamamlananlar</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="todo-list mt-4">
            <div class="todo-header">
                <span></span>
                <span>Görev</span>
                <span>Zaman</span>
                <span>İşlem</span>
            </div>

            <div id="taskContainer"></div>

            <div class="bulk-actions mt-3 d-flex justify-content-between align-items-center">
                <button id="clearCompletedBtn" class="btn btn-outline-warning btn-sm">Tamamlananları Temizle</button>
                <button id="clearAllBtn" class="btn btn-outline-danger btn-sm">Tümünü Sil</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Görevi Düzenle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editTaskId">
                    <div class="mb-3">
                        <label for="editTaskName" class="form-label">Görev Adı</label>
                        <input type="text" class="form-control" id="editTaskName">
                    </div>
                    <div class="row g-2">
                        <div class="col-md-4">
                            <label for="editTaskDate" class="form-label">Tarih</label>
                            <input type="date" class="form-control" id="editTaskDate">
                        </div>
                        <div class="col-md-4">
                            <label for="editTaskTime" class="form-label">Zaman</label>
                            <input type="text" class="form-control" id="editTaskTime" placeholder="SS:DD">
                        </div>
                        <div class="col-md-4">
                            <label for="editTaskPriority" class="form-label">Öncelik</label>
                            <select id="editTaskPriority" class="form-select">
                                <option value="none">Yok</option>
                                <option value="high">Yüksek</option>
                                <option value="medium">Orta</option>
                                <option value="low">Düşük</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Vazgeç</button>
                    <button type="button" class="btn btn-success" id="saveEditBtn">Değişiklikleri Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery 3 -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap 5 JS Bundle (Popper dahil) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="script (1).js"></script>
</body>
</html>
